version: 2

models:
  - name: stg_orders
    description: "Cleaned orders with proper timestamp types and status values"
    columns:
      - name: order_id
        description: "Unique order identifier"
        tests:
          - unique
          - not_null
      - name: order_status
        tests:
          - accepted_values:
              values:
                [
                  "delivered",
                  "shipped",
                  "canceled",
                  "unavailable",
                  "invoiced",
                  "processing",
                  "created",
                  "approved",
                ]
      - name: ordered_at
        tests:
          - not_null

  - name: stg_order_items
    columns:
      - name: order_id
        tests:
          - not_null
          - relationships:
              to: ref('stg_orders')
              field: order_id
      - name: unit_price
        tests:
          - not_null

  - name: stg_customers
    columns:
      - name: customer_id
        tests:
          - unique
          - not_null

  - name: stg_order_payments
    columns:
      - name: order_id
        tests:
          - not_null
      - name: payment_type
        tests:
          - accepted_values:
              values:
                [
                  "credit_card",
                  "boleto",
                  "voucher",
                  "debit_card",
                  "not_defined",
                ]
