version: 2
models:
  - name: fct_orders
    description: "One row per order with all financial, delivery, and review metrics"
    columns:
      - name: order_id
        tests: [unique, not_null]
      - name: order_status
        tests: [not_null]
  - name: dim_customers
    columns:
      - name: customer_id
        tests: [unique, not_null]
  - name: dim_products
    columns:
      - name: product_id
        tests: [unique, not_null]
